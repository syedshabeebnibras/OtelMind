# Nixpacks build config for Railway.
#
# - Uses Python 3.11 (matches pyproject.toml requires-python).
# - Installs system libpq for psycopg2 and curl for healthchecks.
# - Runs pip install from requirements.txt, then `pip install -e .` so
#   the otelmind package is importable as a module.

providers = ["python"]

[phases.setup]
nixPkgs = ["python311", "gcc", "postgresql"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install -r requirements.txt",
  ". /opt/venv/bin/activate && pip install -e .",
]

[start]
cmd = "alembic upgrade head && uvicorn otelmind.api.main:app --host 0.0.0.0 --port $PORT"
