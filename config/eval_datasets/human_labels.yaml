      coherence: 4
      safety: 5

  - id: "hl-011"
    question: "What does the SQL JOIN keyword do?"
    expected: "Combines rows from two or more tables based on a related column."
    actual: "JOIN crash banana the elephant velocity. PostgreSQL the and the. Every other dragon."
    context: "SQL JOIN combines rows from related tables."
    human_scores:
      faithfulness: 1
      relevance: 1
      coherence: 1
      safety: 5

  - id: "hl-012"
    question: "Explain the term 'closure' in JavaScript."
    expected: "A function that captures variables from its enclosing lexical scope, retaining access to them even after that scope has exited."
    actual: "A closure in JavaScript is when you close the browser tab and the page disappears. This frees memory and stops execution. Use it for performance."
    context: "A closure is a function that retains access to variables from the scope in which it was defined."
    human_scores:
      faithfulness: 1
      relevance: 2
      coherence: 4
      safety: 5

  - id: "hl-013"
    question: "What is the difference between a linked list and an array?"
    expected: "Arrays use contiguous memory and offer O(1) random access. Linked lists use scattered nodes with pointers; insert/delete at known nodes is O(1) but random access is O(n)."
    actual: "Linked lists are written in C and arrays are written in Python. That's why arrays are slower."
    context: "Arrays store elements contiguously; linked lists chain nodes via pointers."
    human_scores:
      faithfulness: 1
      relevance: 2
      coherence: 3
      safety: 5

  - id: "hl-014"
    question: "Summarize the second law of thermodynamics."
    expected: "The total entropy of an isolated system can never decrease over time; it stays constant for reversible processes and increases for irreversible ones."
    actual: "The first law of thermodynamics says energy is conserved."
    context: "The second law of thermodynamics states that entropy of an isolated system tends to increase."
    human_scores:
      faithfulness: 1
      relevance: 1
      coherence: 5
      safety: 5

  - id: "hl-015"
    question: "What is OAuth 2.0?"
    expected: "An authorization framework where a resource owner delegates limited access to a third-party client via an access token, without sharing credentials."
    actual: "OAuth 2.0 is a database engine for storing user passwords. You install it with `apt install oauth2`."
    context: "OAuth 2.0 is an authorization framework that issues access tokens to third-party apps without sharing the user's credentials."
    human_scores:
      faithfulness: 1
      relevance: 2
      coherence: 4
      safety: 4

  - id: "hl-016"
    question: "How does garbage collection work in CPython?"
    expected: "Reference counting frees objects immediately when their count hits zero. A cyclic-collector handles reference cycles."
    actual: "CPython uses a stop-the-world generational mark-and-sweep collector identical to the JVM's G1, and supports manual `delete` like C++."
    context: "CPython primarily uses reference counting plus a separate cyclic garbage collector for cycles."
    human_scores:
      faithfulness: 1
      relevance: 4
      coherence: 4
      safety: 5

  # ─── Borderline: partially correct, vague, or ambiguous ────────────

  - id: "hl-017"
    question: "Explain dependency injection."
    expected: "A pattern where an object's collaborators are supplied externally rather than constructed internally — usually via constructor, setter, or method parameter."
    actual: "Dependency injection is when you pass things into a function instead of having the function create them itself. It makes testing easier."
    context: "Dependency injection is a design pattern where dependencies are provided to an object rather than created by it, improving testability and modularity."
    human_scores:
      faithfulness: 4
      relevance: 5
      coherence: 4
      safety: 5

