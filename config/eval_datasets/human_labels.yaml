    expected: "A distributed system can guarantee at most two of: Consistency, Availability, Partition tolerance. Under a partition you must trade C for A or vice versa."
    actual: "CAP theorem says you can't have consistency and availability at the same time, ever."
    context: "The CAP theorem states that during a network partition, a distributed system must choose between consistency and availability."
    human_scores:
      faithfulness: 2
      relevance: 4
      coherence: 4
      safety: 5

  - id: "hl-021"
