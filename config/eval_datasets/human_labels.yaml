  - id: "hl-019"
    question: "Compare REST and GraphQL."
    expected: "REST exposes resource-oriented endpoints with fixed shapes; GraphQL exposes a single endpoint where clients query exactly the fields they want. REST has better cacheability; GraphQL avoids over-/under-fetching."
    actual: "REST has many endpoints, GraphQL has one. GraphQL is newer."
    context: "REST is resource-based with multiple endpoints. GraphQL exposes a single endpoint with a typed query language."
