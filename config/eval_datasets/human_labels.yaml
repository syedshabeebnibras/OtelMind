# Human-labeled gold set for judge calibration.
#
# Each case has a question, the expected answer, an `actual` candidate
# response, optional grounding `context`, and `human_scores` on the
# 1-5 scale dimension that the LLM judge uses internally.
#
# Distribution intent (33 cases total):
#   - 8 strong CS cases     (overall ~4-5 across the board)
#   - 8 clear failures      (one or more dimensions in the 1-2 range)
#   - 9 borderline CS cases (mixed 2-3-4 — these discriminate the judge)
#   - 8 non-CS cases        (medical, legal, math, creative, common-sense,
#                            history × 2, practical advice) so the
#                            calibration isn't dominated by one domain.
#
# Used by: otelmind.eval.calibration.calibrate_judge() and the
# `calibrate_judge` MCP tool / `POST /api/calibrations` endpoint.

cases:
  # ─── Strong: faithful, relevant, coherent answers ──────────────────

  - id: "hl-001"
    question: "What is the capital of France?"
    expected: "Paris"
    actual: "The capital of France is Paris."
    context: "France is a country in Western Europe. Its capital is Paris."
    human_scores:
      faithfulness: 5
      relevance: 5
      coherence: 5
      safety: 5

  - id: "hl-002"
    question: "Explain how a HashMap handles collisions."
    expected: "Open addressing or chaining: chaining stores colliding entries in a per-bucket linked list; open addressing probes other buckets according to a strategy."
    actual: "When two keys hash to the same bucket the HashMap resolves it either by chaining (a linked list per bucket) or by open addressing (probing the next empty slot). Java's HashMap uses chaining with a tree fallback once a bucket grows past 8 entries."
    context: "HashMap collision resolution strategies include separate chaining and open addressing. Java's HashMap uses chaining."
    human_scores:
      faithfulness: 5
      relevance: 5
      coherence: 5
      safety: 5

  - id: "hl-003"
    question: "What does the Python `with` statement do?"
    expected: "Sets up a context manager that guarantees __enter__ before the block and __exit__ after, even if exceptions occur."
    actual: "`with` enters a context manager: it calls __enter__ before the block runs and __exit__ when the block ends, including on exceptions. This is how `with open(...)` guarantees the file is closed."
    context: "Python's `with` statement is syntactic sugar for try/finally that ensures __exit__ is called."
    human_scores:
      faithfulness: 5
      relevance: 5
      coherence: 5
      safety: 5

  - id: "hl-004"
    question: "List three differences between TCP and UDP."
    expected: "TCP is connection-oriented, reliable (ACKs + retransmits), and ordered. UDP is connectionless, unreliable, and unordered."
    actual: "1. TCP is connection-oriented (3-way handshake); UDP is connectionless. 2. TCP guarantees in-order, reliable delivery via ACKs and retransmission; UDP does not. 3. TCP has flow and congestion control; UDP does not."
    context: "TCP provides reliable, ordered delivery using handshakes and acknowledgements. UDP is connectionless and offers no delivery guarantees."
    human_scores:
      faithfulness: 5
      relevance: 5
      coherence: 5
      safety: 5

  - id: "hl-005"
    question: "What is the time complexity of binary search on a sorted array?"
    expected: "O(log n)"
    actual: "O(log n) — each step halves the search space."
    context: "Binary search runs in O(log n) on a sorted array."
    human_scores:
      faithfulness: 5
      relevance: 5
      coherence: 5
      safety: 5

  - id: "hl-006"
    question: "Why use a connection pool for a Postgres backend?"
    expected: "Avoid the per-request cost of TCP setup, TLS handshake, and Postgres process forking. Reuse warm connections under load."
    actual: "Opening a Postgres connection is expensive — TCP, TLS, and a per-connection backend process on the server. A pool keeps a warm set of connections so requests get one instantly instead of paying that startup cost every time. It also caps concurrency so the database isn't overloaded."
    context: "PostgreSQL forks a backend process per connection. Connection pools reuse connections to avoid this overhead."
    human_scores:
      faithfulness: 5
      relevance: 5
      coherence: 5
      safety: 5

  - id: "hl-007"
    question: "What is HTTP status code 429?"
    expected: "Too Many Requests — rate limit exceeded."
    actual: "429 Too Many Requests. The client has hit a rate limit and should back off, ideally honouring the Retry-After header if present."
    context: "HTTP 429 indicates the client has sent too many requests in a given time."
    human_scores:
      faithfulness: 5
      relevance: 5
      coherence: 5
      safety: 5

  - id: "hl-008"
    question: "Define idempotency in the context of HTTP."
    expected: "Multiple identical requests have the same effect as a single one. GET, PUT, DELETE are idempotent; POST is not."
    actual: "An idempotent HTTP method produces the same server state regardless of how many times it's called with the same input. GET, PUT, DELETE, and HEAD are idempotent; POST and PATCH typically are not."
    context: "HTTP idempotency means repeating the request has no additional effect on the server beyond the first request."
    human_scores:
      faithfulness: 5
      relevance: 5
      coherence: 5
      safety: 5

